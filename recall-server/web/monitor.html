<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recall System Monitor</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<header class="topbar">
<div class="nav">
<a href="index.html" class="logo" aria-label="Recall home">
<img src="recall_logo_bw.svg" alt="Recall">
</a>
<nav>
<ul>
<li><a href="media.html">Upload Media</a></li>
<li><a href="devices.html">Devices</a></li>
<li><a href="monitor.html" aria-current="page">System Monitor</a></li>
<li><a href="settings.html">Settings</a></li>
</ul>
</nav>
</div>
</header>

<main class="container">
<h1>System Monitor</h1>
<p class="lead">Smooth live telemetry with quick readability for operational confidence.</p>

<div class="stats">
<div class="card">
<h2>CPU Load</h2>
<canvas id="cpuChart" class="chart"></canvas>
</div>

<div class="card">
<h2>Memory Load</h2>
<canvas id="memChart" class="chart"></canvas>
</div>

<div class="card">
<h2>Technical Data</h2>
<pre id="info">Loading...</pre>
</div>

<div class="card">
<h2>CPU Temperature</h2>
<div id="temp" class="stat-value">--</div>
<p id="monitor_status" class="status">Connecting...</p>
</div>

</div>

</main>

<script>
let cpuData=[]
let memData=[]
let labels=[]

const chartOptions = {
responsive: true,
maintainAspectRatio: false,
plugins: { legend: { display: true } },
scales: { y: { beginAtZero: true, max: 100 } }
}

const cpuChart = new Chart(document.getElementById('cpuChart'), {
type:'line',
data:{ labels:labels, datasets:[{ label:'CPU %', data:cpuData, borderColor:'#0071e3', tension:0.35, fill:false }] },
options: chartOptions
})

const memChart = new Chart(document.getElementById('memChart'), {
type:'line',
data:{ labels:labels, datasets:[{ label:'Memory %', data:memData, borderColor:'#34a853', tension:0.35, fill:false }] },
options: chartOptions
})

async function load(){
const statusEl = document.getElementById('monitor_status')
try {
let r = await fetch('/monitor')
if (!r.ok) throw new Error('HTTP ' + r.status)
let j = await r.json()

let t = new Date().toLocaleTimeString()
labels.push(t)
cpuData.push(j.cpu_percent || 0)
memData.push(j.memory_percent || 0)

if(labels.length>30){
labels.shift()
cpuData.shift()
memData.shift()
}

cpuChart.update()
memChart.update()

document.getElementById('info').innerText =
`CPU cores: ${j.cpu_cores}
CPU freq: ${j.cpu_freq_mhz} MHz

Memory total: ${j.memory_total_mb} MB
Memory used: ${j.memory_used_mb} MB

Disk total: ${j.disk_total_gb} GB
Disk used: ${j.disk_used_gb} GB

System: ${j.system}
Machine: ${j.machine}`

document.getElementById('temp').innerText = (j.cpu_temp || '--') + ' °C' + (j.mock ? ' (mock)' : '')
statusEl.innerText = `Last updated: ${new Date().toLocaleTimeString()}`
} catch {
statusEl.innerText = 'Could not update monitor data. Retrying...'
}
}

setInterval(load,2000)
load()
</script>

</body>
</html>
