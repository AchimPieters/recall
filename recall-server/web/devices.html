<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recall Devices</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header class="topbar">
    <div class="nav">
      <a href="index.html" class="logo" aria-label="Recall home">
          <img src="recall_logo_bw.svg" alt="Recall">
      </a>
        <nav>
            <ul>
                <li><a href="media.html">Upload Media</a></li>
                <li><a href="devices.html" aria-current="page">Devices</a></li>
                <li><a href="monitor.html">System Monitor</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <div class="page-header">
      <h1>Devices</h1>
      <p class="lead">Live device state refreshes automatically so you always see the current fleet health.</p>
    </div>

    <section class="card">
      <pre id="devices">Loading devices...</pre>
      <p id="devices_status" class="status">Refreshing every 2 seconds.</p>
    </section>

    <script>
    async function load() {
        const dataEl = document.getElementById('devices')
        const statusEl = document.getElementById('devices_status')
        try {
            const r = await fetch('/devices')
            if (!r.ok) throw new Error('HTTP ' + r.status)
            const j = await r.json()
            dataEl.innerText = JSON.stringify(j, null, 2)
            statusEl.innerText = `Last updated: ${new Date().toLocaleTimeString()}`
        } catch {
            statusEl.innerText = 'Could not load devices. Retrying...'
        }
    }

    setInterval(load, 2000)
    load()
    </script>

</main>

</body>
</html>
