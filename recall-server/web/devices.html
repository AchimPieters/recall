<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recall Devices</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div class="nav">
      <a href="index.html" class="logo">
          <img src="recall_logo_bw.svg" alt="Recall">
      </a>

        <nav>
            <ul>
                <li><a href="media.html">Upload Media</a></li>
                <li><a href="devices.html">Devices</a></li>
                <li><a href="monitor.html">System Monitor</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <h1>Recall Devices</h1>
    <pre id="devices">Loading devices...</pre>

    <script>
    async function load() {
        const el = document.getElementById("devices")
        try {
            const r = await fetch("/devices")
            const j = await r.json()
            el.innerText = JSON.stringify(j, null, 2)
        } catch {
            el.innerText = "Failed to load devices"
        }
    }

    setInterval(load, 2000)
    load()
    </script>

</main>

</body>
</html>
