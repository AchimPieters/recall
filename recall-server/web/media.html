<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recall Upload Media</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header class="topbar">
    <div class="nav">
      <a href="index.html" class="logo" aria-label="Recall home">
          <img src="recall_logo_bw.svg" alt="Recall">
      </a>
        <nav>
            <ul>
                <li><a href="media.html" aria-current="page">Upload Media</a></li>
                <li><a href="devices.html">Devices</a></li>
                <li><a href="monitor.html">System Monitor</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <div class="page-header">
        <h1>Upload Media</h1>
        <p class="lead">Drop in a file and publish it to your Recall server. Fast upload flow, no unnecessary steps.</p>
    </div>

    <section class="card">
        <form action="/media/upload" method="post" enctype="multipart/form-data" class="actions">
            <input class="file-input" type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
        <p class="status">Supported formats depend on your player configuration.</p>
    </section>
</main>

</body>
</html>
