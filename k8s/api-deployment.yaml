apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recall-api
  template:
    metadata:
      labels:
        app: recall-api
    spec:
      containers:
        - name: api
          image: recall-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://recall:recall@postgres:5432/recall
            - name: REDIS_URL
              value: redis://redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: recall-api
spec:
  selector:
    app: recall-api
  ports:
    - port: 8000
      targetPort: 8000
