apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-api
  labels:
    app: recall-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recall-api
  template:
    metadata:
      labels:
        app: recall-api
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: api
          image: recall-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: recall-api
spec:
  selector:
    app: recall-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recall-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recall-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recall-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: recall-api
