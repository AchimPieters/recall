apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-worker
  labels:
    app: recall-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recall-worker
  template:
    metadata:
      labels:
        app: recall-worker
    spec:
      containers:
        - name: worker
          image: recall-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "recall.workers.celery_app:celery_app", "worker", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recall-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
