apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-frontend
  labels:
    app: recall-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recall-frontend
  template:
    metadata:
      labels:
        app: recall-frontend
    spec:
      containers:
        - name: frontend
          image: recall-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: recall-frontend
spec:
  selector:
    app: recall-frontend
  ports:
    - port: 80
      targetPort: 80
