apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recall-frontend
  template:
    metadata:
      labels:
        app: recall-frontend
    spec:
      containers:
        - name: frontend
          image: recall-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: recall-frontend
spec:
  selector:
    app: recall-frontend
  ports:
    - port: 80
      targetPort: 80
