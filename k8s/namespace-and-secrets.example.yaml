apiVersion: v1
kind: Namespace
metadata:
  name: recall
---
apiVersion: v1
kind: Secret
metadata:
  name: recall-secrets
  namespace: recall
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://recall:recall@postgres:5432/recall
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: change-me
  JWT_SECRETS: change-me,change-me-previous
  RECALL_JWT_SECRET_LAST_ROTATED_AT: "2026-03-01T00:00:00Z"
  RECALL_SECRET_ROTATION_MAX_AGE_DAYS: "30"
