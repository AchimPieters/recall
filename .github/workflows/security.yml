name: Security Scan

on:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install scanner deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "bandit==1.8.2" "pip-audit==2.7.3"
      - name: Bandit
        run: bandit -q -r app -lll
      - name: Dependency audit
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2024-23342
