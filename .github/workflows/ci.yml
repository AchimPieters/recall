name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recall-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio httpx ruff black==24.10.0 mypy bandit pip-audit
      - name: Lint (ruff)
        run: ruff check recall
      - name: Format check (black)
        run: black --check recall tests
      - name: Type check (mypy)
        run: mypy --ignore-missing-imports recall
      - name: Security scan (bandit)
        run: bandit -r recall -q -ll
      - name: Dependency scan (pip-audit)
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2024-23342
      - name: Tests
        run: pytest -q
      - name: Docker build
        working-directory: .
        run: docker build -f docker/Dockerfile -t recall-api:test .
