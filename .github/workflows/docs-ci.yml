name: Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'tools/doc_lint.py'
      - '.github/workflows/docs-ci.yml'
  push:
    branches: ["main", "master"]
    paths:
      - 'docs/**'
      - 'tools/doc_lint.py'

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run docs lint
        run: python tools/doc_lint.py
