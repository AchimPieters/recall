name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: ["main", "master"]
    paths:
      - 'backend/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.9.9" "black==24.10.0" "mypy==1.15.0" "pytest"
      - name: Ruff
        run: ruff check app tests
      - name: Black
        run: black --check app tests
      - name: Mypy
        run: mypy --ignore-missing-imports app
      - name: Runtime schema mutation policy
        run: python ../tools/check_runtime_schema_mutations.py --repo-root ..
      - name: Legacy runtime reference policy
        run: python ../tools/check_legacy_runtime_references.py --repo-root ..
      - name: Pytest
        run: pytest -q tests
