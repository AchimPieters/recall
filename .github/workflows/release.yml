name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate release tag policy
        run: python tools/release_gate_check.py "${GITHUB_REF_NAME}"

      - name: Validate changelog includes release section
        run: python tools/changelog_release_check.py "${GITHUB_REF_NAME}"

      - name: Validate strict acceptance sign-off for release tag
        run: |
          python tools/acceptance_check.py --strict --file "docs/releases/acceptance/${GITHUB_REF_NAME}-signoff.md" --expected-version "${GITHUB_REF_NAME}"

      - name: Backend release smoke tests
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest -q backend/tests/test_release_gate_check.py backend/tests/test_backup_restore.py

      - name: Agent release smoke tests
        run: |
          pip install -r agent/requirements.txt
          pytest -q agent/tests/test_agent_downloader.py agent/tests/test_agent_recovery.py

      - name: Frontend production build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare release artifact
        run: tar -czf recall-${GITHUB_REF_NAME}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recall-${{ github.ref_name }}
          path: recall-${{ github.ref_name }}.tar.gz
